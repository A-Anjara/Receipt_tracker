<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dépenses — Receipt Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@500;600&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#F7F4EE',
            surface: '#EEEADF',
            deep: '#E5E0D4',
            ink: '#1C1A17',
            muted: '#8C8478',
            accent: '#3D6B4F',
            'accent-lt': '#E8F0EC',
          },
          fontFamily: {
            display: ['Playfair Display', 'Georgia', 'serif'],
            serif: ['Lora', 'Georgia', 'serif'],
            sans: ['DM Sans', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>
  <style>
    body {
      background: #F7F4EE;
      color: #1C1A17;
      font-family: 'DM Sans', sans-serif;
    }

    .type-recu {
      background: #F6F0E8;
      color: #7A6040;
    }

    .type-facture {
      background: #EAF0EC;
      color: #3A5F4E;
    }

    .type-facture-pro {
      background: #F6EDEA;
      color: #7A3E2E;
    }
  </style>
</head>

<body class="min-h-screen">

  <!-- App shell -->
  <div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-56 shrink-0 bg-surface border-r border-ink/10 flex flex-col gap-5 p-5">
      <div class="flex flex-col gap-2">
        <p class="text-[10px] uppercase tracking-widest text-muted font-medium">Envoyer un reçu</p>
        <!-- Hidden native file input, accepts images -->
        <input type="file" id="receipt-upload" accept="image/*" class="hidden">
        <!-- Styled drop zone label triggers the hidden input -->
        <label for="receipt-upload" id="upload-dropzone"
          class="flex flex-col items-center justify-center gap-1.5 border-2 border-dashed border-ink/20 rounded-xl py-4 px-3 cursor-pointer hover:border-accent hover:bg-accent-lt text-center">

          <span class="text-[12px] text-muted leading-tight">Cliquez<br>ou glisser une photo</span>
        </label>
        <!-- Preview thumbnail shown after file is picked -->
        <div id="upload-preview" class="hidden flex-col gap-1.5">
          <img id="upload-thumb" src="" alt="Aperçu du reçu"
            class="w-full rounded-lg object-cover max-h-28 border border-ink/10">
          <p id="upload-filename" class="font-mono text-[11px] text-muted truncate"></p>
          <div class="flex justify-between">
            <button id="upload-clear" class="text-[12px] text-muted underline text-left">Supprimer</button>
            <button id="upload-send" class="text-[12px] text-green-800 underline ">Envoyer</button>

          </div>
        </div>
      </div>

      <div>
        <p class="text-[10px] uppercase tracking-widest text-muted font-medium mb-2">Étendue Date</p>
        <div class="flex flex-col gap-1.5">
          <input type="date"
            class="font-mono text-[12px] px-3 py-1.5 bg-white border border-ink/10 rounded-lg text-ink w-full"
            id="date_start">
          <input type="date"
            class="font-mono text-[12px] px-3 py-1.5 bg-white border border-ink/10 rounded-lg text-ink w-full"
            id="date_end">
        </div>
        <div class="p-1"></div>
        <button id="change-date" class="text-[10px] p-1 bg-white rounded-lg text-black ">Appliquer</button>

      </div>



      <div>
        <p class="text-[10px] uppercase tracking-widest text-muted font-medium mb-2">Categories</p>
        <div id="filter-chips" class="flex flex-col gap-1">
          <button
            class="chip flex items-center gap-2 px-2.5 py-1.5 rounded-lg text-[13px] font-medium bg-white shadow-sm"
            data-cat="all"><span class="w-2 h-2 rounded-full bg-ink shrink-0"></span>All</button>
          <button
            class="chip flex items-center gap-2 px-2.5 py-1.5 rounded-lg text-[13px] font-medium bg-white shadow-sm"
            data-cat="recu"><span class="w-2 h-2 rounded-full shrink-0"
              style="background:#C4A882"></span>Reçu</button>
          <button
            class="chip flex items-center gap-2 px-2.5 py-1.5 rounded-lg text-[13px] font-medium bg-white shadow-sm"
            data-cat="facture"><span class="w-2 h-2 rounded-full shrink-0"
              style="background:#87A896"></span>Facture</button>
          <button
            class="chip flex items-center gap-2 px-2.5 py-1.5 rounded-lg text-[13px] font-medium bg-white shadow-sm"
            data-cat="facture_pro"><span class="w-2 h-2 rounded-full shrink-0"
              style="background:#C98B7A"></span>Facture Pro</button>
          
        </div>
      </div>





    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col ">

      <!-- Top bar -->
      <header class="flex items-center justify-between px-8 py-4 border-b border-ink/10 bg-paper">
        <div class="flex items-center gap-2.5 flex-1">
          <button onclick="document.getElementById('sidebar').classList.toggle('hidden')"
            class="w-8 h-8 flex items-center justify-center rounded-lg text-muted hover:bg-surface text-lg">☰</button>
          <span class="font-serif text-base font-semibold">Dépenses</span>
        </div>
        <div class="flex-0 text-center text-[13px] text-muted"><strong class="text-ink font-medium"
            id="datetoday"></strong> · Antananarivo</div>

      </header>

      <!-- Content -->
      <main class="flex-1 p-8 flex flex-col gap-7 overflow-y-auto">

        <!-- KPI row -->
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-white border border-ink/10 rounded-xl p-5">
            <p class="text-[10px] uppercase tracking-widest text-muted font-medium mb-3">Total</p>
            <p class="font-display text-4xl font-bold leading-none" id="kpi-total"></p>
            <p class="mt-2 text-[12px] text-muted">Ariary </p>
          </div>
          <div class="bg-white border border-ink/10 rounded-xl p-5">
            <p class="text-[10px] uppercase tracking-widest text-muted font-medium mb-3">Nombre</p>
            <p class="font-display text-4xl font-bold leading-none" id="kpi-count"></p>
            <p class="mt-2 text-[12px] text-muted">reçus</p>
          </div>
        </div>

        <!-- Charts row -->
        <div class="grid grid-cols-[1.4fr_1fr] gap-5">
          <div class="bg-white border border-ink/10 rounded-xl p-6">
            <p class="font-serif text-sm font-semibold mb-5">Dépense par catégorie</p>
            <div id="category-bars" class="flex flex-col gap-3"></div>
          </div>
          <div class="bg-white border border-ink/10 rounded-xl p-6">
            <p class="font-serif text-sm font-semibold mb-4">Tendance</p>
            <div class="relative h-48">
              <canvas id="trendChart" role="img" aria-label="Line chart of daily spending in June 2025">Dépense
                Journalière</canvas>
            </div>
          </div>
        </div>

        <!-- Receipt table -->
        <div class="bg-white border border-ink/10 rounded-xl overflow-hidden">
          <div class="flex items-center justify-between px-6 py-4 border-b border-ink/10">
            <p class="font-serif text-sm font-semibold">Reçus</p>
            <p class="text-[12px] text-muted" id="receipt-count"></p>
          </div>
          <table class="w-full border-collapse">
            <thead>
              <tr class="bg-surface">
                <th class="text-left text-[11px] uppercase tracking-wider text-muted font-medium px-6 py-2.5">Date</th>
                <th class="text-left text-[11px] uppercase tracking-wider text-muted font-medium px-4 py-2.5">Libellé
                </th>
                <th class="text-left text-[11px] uppercase tracking-wider text-muted font-medium px-4 py-2.5">Categorie
                </th>
                <th class="text-right text-[11px] uppercase tracking-wider text-muted font-medium px-6 py-2.5">Montant
                  (Ar)</th>
              </tr>
            </thead>
            <tbody id="receipt-tbody"></tbody>
          </table>
        </div>

      </main>
    </div>
  </div>

  <!-- Detail panel overlay -->
  <div id="panel-overlay" class="fixed inset-0 bg-ink/20 opacity-0 pointer-events-none z-40" onclick="closePanel()">
  </div>

  <!-- Detail panel -->
  <div id="detail-panel"
    class="detail-panel fixed right-0 top-0 bottom-0 w-76 bg-paper border-l border-ink/10 z-50 flex flex-col translate-x-full">
    <div id="panel-photo" class="mx-4 mt-4 h-80 bg-surface rounded-2xl overflow-hidden relative shrink-0"></div>
    <div class="p-6 flex-1 overflow-y-auto">
      <button onclick="closePanel()"
        class="absolute top-5 right-5 w-7 h-7 rounded-full bg-white/80 border border-ink/10 text-muted text-sm flex items-center justify-center">✕</button>
      <p class="font-display text-2xl font-bold mb-1" id="panel-merchant"></p>
      <p class="font-mono text-[11px] text-muted mb-5" id="panel-date"></p>
      <div id="panel-fields" class="flex flex-col"></div>
    </div>
  </div>

  <script>
    //
    HOST = 'https://receipt-tracker-titx.onrender.com';
    // DATE D'AUJOURD'HUI
    let today_element = document.getElementById("datetoday");
    let today = new Date();
    let month = today.toLocaleString('fr-FR', { month: 'long' });
    let year = today.getFullYear();
    today_element.innerText = `${month[0].toUpperCase()}${month.slice(1)} ${year}`;
    // DATE RANGE
    let date_start_element = document.getElementById("date_start");
    let date_end_element = document.getElementById("date_end");
    date_start_element.value = `${today.getFullYear()}-${(today.getMonth() + 1).toString().padStart(2, "0")}-01`;
    date_end_element.value = `${today.getFullYear()}-${(today.getMonth() + 1).toString().padStart(2, "0")}-${today.getDate()}`;




    const CAT = {
      recu: { cls: 'cat-recu', bar: '#C4A882' },
      facture: { cls: 'cat-facture', bar: '#87A896' },
      facture_pro: { cls: 'cat-facture-pro', bar: '#C98B7A' },

    };
    let RECEIPTS = [];

    // let RECEIPTS = [
    //   { id: 1, date: '2025-06-02', merchant: 'EDF Energy', cat: 'Bills', amount: 185000, note: 'Monthly electricity' },
    //   { id: 2, date: '2025-06-03', merchant: 'Shoprite Analakely', cat: 'Groceries', amount: 67400, note: 'Weekly groceries' },
    //   { id: 3, date: '2025-06-04', merchant: 'Le Baobab', cat: 'Restaurants', amount: 38500, note: 'Business lunch' },
    //   { id: 4, date: '2025-06-05', merchant: 'Taxi Mora', cat: 'Transport', amount: 12000, note: 'Airport transfer' },
    //   { id: 5, date: '2025-06-06', merchant: 'Canal+', cat: 'Bills', amount: 42000, note: 'Monthly subscription' },
    //   { id: 6, date: '2025-06-08', merchant: 'Jumia Madagascar', cat: 'Shopping', amount: 89500, note: 'Household items' },
    //   { id: 7, date: '2025-06-09', merchant: 'Clinique Ambohipo', cat: 'Medical', amount: 55000, note: 'Consultation générale' },
    //   { id: 8, date: '2025-06-10', merchant: 'Shoprite Analakely', cat: 'Groceries', amount: 52300, note: 'Weekly groceries' },
    //   { id: 9, date: '2025-06-11', merchant: 'La Varangue', cat: 'Restaurants', amount: 47000, note: 'Dinner with client' },
    //   { id: 10, date: '2025-06-12', merchant: 'Taxi Mora', cat: 'Transport', amount: 8500, note: 'City ride' },
    //   { id: 11, date: '2025-06-13', merchant: 'Orange Madagascar', cat: 'Bills', amount: 35000, note: 'Mobile data' },
    //   { id: 12, date: '2025-06-15', merchant: 'Pharmacie Analakely', cat: 'Medical', amount: 23500, note: 'Prescriptions' },
    //   { id: 13, date: '2025-06-17', merchant: 'Shoprite Tana', cat: 'Groceries', amount: 74800, note: 'Monthly bulk shop' },
    //   { id: 14, date: '2025-06-18', merchant: 'Score Supermarché', cat: 'Groceries', amount: 31200, note: 'Top-up shop' },
    //   { id: 15, date: '2025-06-19', merchant: 'Taxi Mora', cat: 'Transport', amount: 150000, note: 'Cross-city trip' },
    //   { id: 16, date: '2025-06-21', merchant: 'Espace Malagasy', cat: 'Shopping', amount: 112000, note: 'Clothing & accessories' },
    //   { id: 17, date: '2025-06-23', merchant: 'Le Relais des Plateaux', cat: 'Restaurants', amount: 29500, note: 'Lunch' },
    //   { id: 18, date: '2025-06-26', merchant: 'CityFarma', cat: 'Medical', amount: 18000, note: 'Vitamins' },
    // ];

    // const DAILY = {2:185000,3:67400,4:38500,5:12000,6:42000,8:89500,9:55000,10:52300,11:47000,12:8500,13:35000,15:23500,17:74800,18:31200,19:15000,21:112000,23:29500,26:18000};

    let active = new Set(Object.keys(CAT));
    let trendChart = null;

    const fmt = n => Math.round(n).toLocaleString('fr-MG');

    function filtered() { return RECEIPTS.filter(r => active.has(r.type)); }

    function onload(loading = true) {
      if (loading) {
        document.getElementById('kpi-total').textContent = "-";
        document.getElementById('kpi-count').textContent = "-";
        document.getElementById('receipt-count').textContent = "-";
      }

    }

    async function render(fetching=true) {
      if(fetching){
        let payload = {
          date_start: date_start_element.value, 
          date_end: date_end_element.value      
        };
        let result = await fetch(`${HOST}/filter`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
        result = await result.json();
        RECEIPTS = result.results;

      }
      
      const recs = filtered();
      const total = recs.reduce((s, r) => s + parseFloat(r.total), 0.0);

      document.getElementById('kpi-total').textContent = fmt(total);
      document.getElementById('kpi-count').textContent = recs.length;
      document.getElementById('receipt-count').textContent = recs.length + ' transactions';

      // Category bars
      const totals = {};
      recs.forEach(r => { totals[r.type] = (totals[r.type] || 0) + parseFloat(r.total); });
      const max = Math.max(...Object.values(totals), 1);
      const barsEl = document.getElementById('category-bars');
      barsEl.innerHTML = Object.entries(totals).sort((a, b) => b[1] - a[1]).map(([cat, amt]) =>
        `<div class="flex items-center gap-2.5">
      <span class="w-20 text-right text-[12px] text-muted shrink-0">${cat}</span>
      <div class="flex-1 h-2.5 bg-surface rounded-full overflow-hidden">
        <div class="h-full rounded-full" style="width:${Math.round(amt / max * 100)}%;background:${CAT[cat].bar}"></div>
      </div>
      <span class="w-24 text-right font-mono text-[12px] shrink-0">${fmt(amt)}</span>
    </div>`
      ).join('');

      // Table
      const tbody = document.getElementById('receipt-tbody');
      tbody.innerHTML = [...recs].sort((a, b) => b.date.localeCompare(a.date)).map(r =>
        `<tr class="receipt-row cursor-pointer border-b border-ink/[0.06]" data-id="${r.id}">
      <td class="px-6 py-3 font-mono text-[12px] text-muted">${r.date.split('-').reverse().join("/")}</td>
      <td class="px-4 py-3 text-[13px] font-medium">${r.title}</td>
      <td class="px-4 py-3"><span class="inline-flex px-2.5 py-0.5 rounded-full text-[11px] font-medium ${CAT[r.type].cls}">${r.type}</span></td>
      <td class="px-6 py-3 text-right font-mono text-[13px] font-medium">${fmt(r.total)}</td>
    </tr>`
      ).join('');

      tbody.querySelectorAll('tr').forEach(tr => {
        tr.onclick = () => openPanel(RECEIPTS.find(r => r.id == tr.dataset.id));
      });
      renderTrend();
    }


    function calculate_date(startdate, comparedate) {
      let delta_date_start = new Date(startdate);
      let delta_date_end = new Date(comparedate);
      msTime = 1000 * 60 * 60 * 24;
      let delta_date = Math.abs(delta_date_end - delta_date_start);
      delta_date = Math.floor(delta_date / msTime);
      return delta_date;
    }

    function renderTrend() {
      let current_start_date = date_start_element.value;
      let n_days = calculate_date(date_start_element.value, date_end_element.value) + 1;
      let tick = Math.floor(n_days / 5);

      recs = filtered();
      values = Array(n_days).fill(0);
      // Calculer le total dans un jour pour chaque jour
      recs.forEach(r => {
        values[calculate_date(current_start_date, r.date)] += r.total;
      });

      if (trendChart) trendChart.destroy();
      const labels = Array.from({ length: values.length }, (_, i) => i + 1);
      trendChart = new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
          labels: labels.map(d => d % tick == 0 ? d : ''),
          datasets: [{
            data: values,
            borderColor: '#3D6B4F', borderWidth: 2,
            backgroundColor: 'rgba(61,107,79,.07)', fill: true,
            pointRadius: 0, tension: .4
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false }, tooltip: {
              callbacks: { label: ctx => 'Ar ' + fmt(ctx.raw) },
              backgroundColor: 'rgba(28,26,23,.85)', titleColor: '#F7F4EE', bodyColor: '#F7F4EE',
              padding: 10, cornerRadius: 8, displayColors: false
            }
          },
          scales: {
            x: { grid: { color: 'rgba(28,26,23,.05)' }, ticks: { color: '#8C8478', font: { size: 11 }, autoSkip: false, maxRotation: 0 } },
            y: { grid: { color: 'rgba(28,26,23,.05)' }, ticks: { color: '#8C8478', font: { size: 11 }, callback: v => v >= 1000 ? Math.round(v / 1000) + 'k' : v }, border: { display: false } }
          }
        }
      });
    }

    function openPanel(r) {
      const bg = { recu: '#F0E8D8', facture: '#D8EAE2', facture_pro: '#F0E2DC'};
      document.getElementById('panel-photo').style.background = bg[r.type] || '#EEE';
      document.getElementById('panel-photo').innerHTML = `<img src="/static/${r.file}" style="width:100%;height:100%;display:block;" />`;
      document.getElementById('panel-merchant').textContent = r.title;
      document.getElementById('panel-date').textContent = r.date.split('-').reverse().join("/") + ' · ' + r.file;
      document.getElementById('panel-fields').innerHTML = [
        ['Amount', `<span class="font-display text-xl font-bold">Ar ${fmt(r.total)}</span>`],
        ['Category', `<span class="inline-flex px-2.5 py-0.5 rounded-full text-[11px] font-medium ${CAT[r.type].cls}">${r.type}</span>`],
        ['Date', `<span class="font-mono text-[13px]">${r.date.split('-').reverse().join("/")}</span>`]
      ].map(([l, v]) =>
        `<div class="flex justify-between items-center py-3 border-b border-ink/[0.07]">
      <span class="text-[12px] text-muted">${l}</span>${v}
    </div>`
      ).join('');
      document.getElementById('detail-panel').classList.remove('translate-x-full');
      document.getElementById('panel-overlay').classList.remove('opacity-0', 'pointer-events-none');
      document.getElementById('panel-overlay').classList.add('opacity-100');
    }

    function closePanel() {
      document.getElementById('detail-panel').classList.add('translate-x-full');
      document.getElementById('panel-overlay').classList.add('opacity-0', 'pointer-events-none');
      document.getElementById('panel-overlay').classList.remove('opacity-100');
    }

    // Filter chips
    document.getElementById('filter-chips').addEventListener('click', e => {
      const btn = e.target.closest('.chip');
      if (!btn) return;
      const cat = btn.dataset.cat;
      
      if (cat === 'all') {
        active = active.size === 3 ? new Set() : new Set(Object.keys(CAT));
      } else {
        active.has(cat) ? active.delete(cat) : active.add(cat);
      }
      document.querySelectorAll('.chip').forEach(b => {
        const c = b.dataset.cat;
        const on = c === 'all' ? active.size === 3 : active.has(c);
        b.classList.toggle('bg-white', on);
        b.classList.toggle('shadow-sm', on);
        b.classList.toggle('text-muted', !on);
        b.classList.toggle('bg-transparent', !on);
      });
      render(false);
    });

    render();


    (function () {
      const input = document.getElementById('receipt-upload');
      const dropzone = document.getElementById('upload-dropzone');
      const preview = document.getElementById('upload-preview');
      const thumb = document.getElementById('upload-thumb');
      const filename = document.getElementById('upload-filename');
      const clearBtn = document.getElementById('upload-clear');
      const sendBtn = document.getElementById('upload-send');

      // Show thumbnail preview after a File object is selected
      function showPreview(file) {
        if (!file || !file.type.startsWith('image/')) return;
        thumb.src = URL.createObjectURL(file);
        filename.textContent = file.name;
        dropzone.classList.add('hidden');
        preview.classList.remove('hidden');
        preview.classList.add('flex');
      }

      // Reset back to drop zone state
      function clearUpload() {
        input.value = '';
        URL.revokeObjectURL(thumb.src);
        thumb.src = '';
        dropzone.classList.remove('hidden');
        preview.classList.add('hidden');
        preview.classList.remove('flex');
      }

      async function sendFile() {
        sendBtn.disabled = true;
        sendBtn.innerText = "En cours...";
        let formdata = new FormData();
        formdata.append('file',input.files[0]);
        let result = await fetch(`${HOST}/upload`, {"method":"POST",body:formdata});
        result = await result.json();
        clearUpload();
        sendBtn.disabled = true;
        sendBtn.innerText = "Envoyer";

      }
      sendBtn.addEventListener('click',sendFile);

      // Native file-picker change
      input.addEventListener('change', () => {
        if (input.files[0]) showPreview(input.files[0]);
      });

      // Drag-and-drop onto the drop zone label
      dropzone.addEventListener('dragover', e => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });
      dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
      dropzone.addEventListener('drop', e => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) { input.files = e.dataTransfer.files; showPreview(file); }
      });

      // Clear / remove button
      clearBtn.addEventListener('click', clearUpload);
    })();



    let change_date = document.getElementById("change-date");
    change_date.addEventListener('click',()=>{change_date.disabled = true;render();change_date.disabled = false});





  </script>
</body>

</html>
